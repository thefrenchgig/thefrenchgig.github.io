<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Hero background placeholder">
  <defs>
    <radialGradient id="stage" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a1d10"/>
      <stop offset="60%" stop-color="#1a0d08"/>
      <stop offset="100%" stop-color="#08060a"/>
    </radialGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0"/>
      <stop offset="40%" stop-color="#f0c674" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#stage)"/>
  <g opacity="0.4">
    <circle cx="380" cy="280" r="180" fill="#ef4135" opacity="0.18"/>
    <circle cx="1180" cy="320" r="220" fill="#0055a4" opacity="0.18"/>
    <circle cx="800" cy="220" r="140" fill="#f0c674" opacity="0.22"/>
  </g>
  <rect width="1600" height="900" fill="url(#haze)"/>
  <text x="800" y="780" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f5f0e6" opacity="0.35" font-style="italic">replace assets/hero-bg.svg with a real photo (assets/hero-bg.jpg)</text>
</svg>
